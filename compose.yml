services:
  # Service Registry
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # PostgreSQL via Supabase
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    networks:
      - app-network
    environment:
      - SPRING_DATASOURCE_URL=${SUPABASE_POSTGRES_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    ports:
      - "8082:8082"
    networks:
      - app-network
    environment:
      - SPRING_DATASOURCE_URL=${SUPABASE_POSTGRES_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    networks:
      - app-network
    environment:
      - SPRING_DATASOURCE_URL=${SUPABASE_POSTGRES_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Medical Record Service (MongoDB via Atlas)
  medical-record-service:
    build:
      context: ./medical-record-service
      dockerfile: Dockerfile
    container_name: medical-record-service
    ports:
      - "8085:8085"
    networks:
      - app-network
    environment:
      - SPRING_DATA_MONGODB_URI=${MONGODB_ATLAS_URI}
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  schedule-service:
    build:
      context: ./schedule-service
      dockerfile: Dockerfile
    container_name: schedule-service
    ports:
      - "8084:8084"
    networks:
      - app-network
    environment:
      - SPRING_DATASOURCE_URL=${SUPABASE_POSTGRES_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # The Orchestrator (Appointment Service)
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    ports:
      - "8083:8083"
    networks:
      - app-network
    environment:
      - SPRING_DATASOURCE_URL=${SUPABASE_POSTGRES_URL}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
    depends_on:
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      schedule-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # API Gateaway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      schedule-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      medical-record-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

networks:
  app-network:
    driver: bridge
