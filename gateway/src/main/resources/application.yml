server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false          # Routing manual (bukan auto-discovery)
          lower-case-service-id: true
      routes:
        # ========== API Routes ==========
        # Semua request diteruskan ke service tujuan via Eureka Load Balancer (lb://)
        # RewritePath: hapus prefix path publik, tambahkan prefix /api yang digunakan controller

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
            - RewritePath=/users/(?<path>.*), /api/${path}

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/doctors/**
          filters:
            - RewritePath=/doctors/(?<path>.*), /api/${path}

        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**
          filters:
            - RewritePath=/appointments/(?<path>.*), /api/${path}

        - id: schedule-service
          uri: lb://schedule-service
          predicates:
            - Path=/schedules/**
          filters:
            - RewritePath=/schedules/(?<path>.*), /api/${path}

        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/records/**
          filters:
            - RewritePath=/records/(?<path>.*), /api/${path}

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
          filters:
            - RewritePath=/payments/(?<path>.*), /api/${path}

        # ========== Swagger / OpenAPI Aggregation Routes ==========
        # Proxy ke endpoint /v3/api-docs masing-masing service via Eureka
        # Digunakan oleh Swagger UI gateway untuk menampilkan docs semua service

        - id: user-service-api-docs
          uri: lb://user-service
          predicates:
            - Path=/api-docs/user/**
          filters:
            - RewritePath=/api-docs/user/(?<path>.*), /v3/api-docs/${path}

        - id: doctor-service-api-docs
          uri: lb://doctor-service
          predicates:
            - Path=/api-docs/doctor/**
          filters:
            - RewritePath=/api-docs/doctor/(?<path>.*), /v3/api-docs/${path}

        - id: appointment-service-api-docs
          uri: lb://appointment-service
          predicates:
            - Path=/api-docs/appointment/**
          filters:
            - RewritePath=/api-docs/appointment/(?<path>.*), /v3/api-docs/${path}

        - id: schedule-service-api-docs
          uri: lb://schedule-service
          predicates:
            - Path=/api-docs/schedule/**
          filters:
            - RewritePath=/api-docs/schedule/(?<path>.*), /v3/api-docs/${path}

        - id: medical-record-service-api-docs
          uri: lb://medical-record-service
          predicates:
            - Path=/api-docs/medical-record/**
          filters:
            - RewritePath=/api-docs/medical-record/(?<path>.*), /v3/api-docs/${path}

        - id: payment-service-api-docs
          uri: lb://payment-service
          predicates:
            - Path=/api-docs/payment/**
          filters:
            - RewritePath=/api-docs/payment/(?<path>.*), /v3/api-docs/${path}

# ========== Eureka Client Configuration ==========
eureka:
  client:
    service-url:
      # URL Eureka Server — gunakan nama container "discovery-service" saat di Docker,
      # atau "localhost" saat development lokal (jalankan dengan -Deureka.client.service-url.defaultZone=http://localhost:8761/eureka)
      defaultZone: http://discovery-service:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5   # Lebih cepat mendapat update registry (default 30s)
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ========== Actuator ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted   # Aktifkan endpoint /actuator/gateway untuk melihat routes

# ========== Swagger / OpenAPI Aggregator ==========
# Gateway mengagregasi API docs dari semua service melalui proxy routes di atas.
# Akses: http://localhost:8080/swagger-ui.html → pilih service dari dropdown
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    # Daftar URL OpenAPI docs dari masing-masing service (via proxy route di atas)
    urls:
      - name: user-service
        url: /api-docs/user
      - name: doctor-service
        url: /api-docs/doctor
      - name: appointment-service
        url: /api-docs/appointment
      - name: schedule-service
        url: /api-docs/schedule
      - name: medical-record-service
        url: /api-docs/medical-record
      - name: payment-service
        url: /api-docs/payment
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false

# ========== Spring Profiles ==========
# Untuk development lokal (tanpa Docker), jalankan dengan profile "local":
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
# atau set environment variable: SPRING_PROFILES_ACTIVE=local

---
# Profile: local — development lokal tanpa Docker
spring:
  config:
    activate:
      on-profile: local

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

---
# Profile: docker — digunakan saat berjalan di Docker Compose
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
