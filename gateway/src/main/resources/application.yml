server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        # ========== API Routes ==========
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**, /api/auth/**

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/doctors/**

        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**

        - id: schedule-service
          uri: lb://schedule-service
          predicates:
            - Path=/schedules/**

        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/medical-records/**
          filters:
            - RewritePath=/records/(?<path>.*), /medical-records/$1

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**

        # ========== Swagger / OpenAPI Routes ==========
        # Route to individual service swagger docs
        - id: user-service-swagger
          uri: lb://user-service
          predicates:
            - Path=/swagger/user/**
          filters:
            - RewritePath=/swagger/user/(?<path>.*), /$1

        - id: doctor-service-swagger
          uri: lb://doctor-service
          predicates:
            - Path=/swagger/doctor/**
          filters:
            - RewritePath=/swagger/doctor/(?<path>.*), /$1

        - id: appointment-service-swagger
          uri: lb://appointment-service
          predicates:
            - Path=/swagger/appointment/**
          filters:
            - RewritePath=/swagger/appointment/(?<path>.*), /$1

        - id: schedule-service-swagger
          uri: lb://schedule-service
          predicates:
            - Path=/swagger/schedule/**
          filters:
            - RewritePath=/swagger/schedule/(?<path>.*), /$1

        - id: medical-record-service-swagger
          uri: lb://medical-record-service
          predicates:
            - Path=/swagger/medical-record/**
          filters:
            - RewritePath=/swagger/medical-record/(?<path>.*), /$1

        - id: payment-service-swagger
          uri: lb://payment-service
          predicates:
            - Path=/swagger/payment/**
          filters:
            - RewritePath=/swagger/payment/(?<path>.*), /$1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /swagger/user/v3/api-docs
      - name: doctor-service
        url: /swagger/doctor/v3/api-docs
      - name: appointment-service
        url: /swagger/appointment/v3/api-docs
      - name: schedule-service
        url: /swagger/schedule/v3/api-docs
      - name: medical-record-service
        url: /swagger/medical-record/v3/api-docs
      - name: payment-service
        url: /swagger/payment/v3/api-docs

# ========== Eureka Client Configuration ==========
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://discovery-service:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ========== Actuator ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted
